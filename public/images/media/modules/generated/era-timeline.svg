<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 180" font-family="system-ui, -apple-system, sans-serif" role="img" aria-label="AI History Era Timeline: seven eras from Precursors to Foundation Models">
  <title>AI History Era Timeline</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#666"/>
    </marker>
  </defs>

  <!-- Era 1 -->
  <rect x="10" y="20" width="148" height="140" rx="8" fill="#f5f0e8" stroke="#8b7355" stroke-width="1.5"/>
  <text x="84" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Era 1</text>
  <text x="84" y="68" text-anchor="middle" font-size="10" fill="#555">Precursors to</text>
  <text x="84" y="82" text-anchor="middle" font-size="10" fill="#555">Machine Intelligence</text>
  <text x="84" y="108" text-anchor="middle" font-size="10" font-style="italic" fill="#888">pre-1940</text>

  <line x1="158" y1="90" x2="178" y2="90" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Era 2 -->
  <rect x="180" y="20" width="148" height="140" rx="8" fill="#f5f0e8" stroke="#8b7355" stroke-width="1.5"/>
  <text x="254" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Era 2</text>
  <text x="254" y="68" text-anchor="middle" font-size="10" fill="#555">Computation,</text>
  <text x="254" y="82" text-anchor="middle" font-size="10" fill="#555">Information &amp;</text>
  <text x="254" y="96" text-anchor="middle" font-size="10" fill="#555">Field Formation</text>
  <text x="254" y="122" text-anchor="middle" font-size="10" font-style="italic" fill="#888">1936–1956</text>

  <line x1="328" y1="90" x2="348" y2="90" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Era 3 -->
  <rect x="350" y="20" width="148" height="140" rx="8" fill="#f5f0e8" stroke="#8b7355" stroke-width="1.5"/>
  <text x="424" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Era 3</text>
  <text x="424" y="68" text-anchor="middle" font-size="10" fill="#555">Symbolic Optimism</text>
  <text x="424" y="82" text-anchor="middle" font-size="10" fill="#555">&amp; Early AI Programs</text>
  <text x="424" y="108" text-anchor="middle" font-size="10" font-style="italic" fill="#888">1956–1974</text>

  <line x1="498" y1="90" x2="518" y2="90" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Era 4 -->
  <rect x="520" y="20" width="148" height="140" rx="8" fill="#f0e0d0" stroke="#a0522d" stroke-width="1.5"/>
  <text x="594" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Era 4</text>
  <text x="594" y="68" text-anchor="middle" font-size="10" fill="#555">Knowledge Systems,</text>
  <text x="594" y="82" text-anchor="middle" font-size="10" fill="#555">Critique &amp; the</text>
  <text x="594" y="96" text-anchor="middle" font-size="10" fill="#555">First AI Winter</text>
  <text x="594" y="122" text-anchor="middle" font-size="10" font-style="italic" fill="#888">1974–1993</text>

  <line x1="668" y1="90" x2="688" y2="90" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Era 5 -->
  <rect x="690" y="20" width="148" height="140" rx="8" fill="#f5f0e8" stroke="#8b7355" stroke-width="1.5"/>
  <text x="764" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Era 5</text>
  <text x="764" y="68" text-anchor="middle" font-size="10" fill="#555">Statistical Learning</text>
  <text x="764" y="82" text-anchor="middle" font-size="10" fill="#555">&amp; Network Revival</text>
  <text x="764" y="108" text-anchor="middle" font-size="10" font-style="italic" fill="#888">1986–2011</text>

  <line x1="838" y1="90" x2="858" y2="90" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Era 6 -->
  <rect x="860" y="20" width="148" height="140" rx="8" fill="#e8f0f5" stroke="#4682b4" stroke-width="1.5"/>
  <text x="934" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Era 6</text>
  <text x="934" y="68" text-anchor="middle" font-size="10" fill="#555">Deep Learning</text>
  <text x="934" y="82" text-anchor="middle" font-size="10" fill="#555">Breakthroughs</text>
  <text x="934" y="108" text-anchor="middle" font-size="10" font-style="italic" fill="#888">2012–2017</text>

  <line x1="1008" y1="90" x2="1028" y2="90" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Era 7 -->
  <rect x="1030" y="20" width="158" height="140" rx="8" fill="#e8f0f5" stroke="#4682b4" stroke-width="1.5"/>
  <text x="1109" y="48" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Era 7</text>
  <text x="1109" y="68" text-anchor="middle" font-size="10" fill="#555">Foundation Models</text>
  <text x="1109" y="82" text-anchor="middle" font-size="10" fill="#555">&amp; Generative AI</text>
  <text x="1109" y="108" text-anchor="middle" font-size="10" font-style="italic" fill="#888">2017–present</text>
</svg>
